<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI vs Human Detection</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 650px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(255, 0, 150, 0.4);
            text-align: center;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
            color: #ff0080;
            text-shadow: 0 0 15px #ff0080;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            border: 1px solid #ff0080;
            padding: 12px;
            font-size: 15px;
            resize: none;
            outline: none;
            background: #111;
            color: #fff;
        }

        textarea:focus {
            box-shadow: 0 0 10px #ff0080;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #ff0080, #ff4da6);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff0080;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 20px rgba(255,0,150,0.3);
        }

        .confidence-bar {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 10px;
            border-radius: 10px;
            background: linear-gradient(90deg, #ff0080, #ff4da6);
            width: {{ confidence }}%;
            transition: width 0.5s ease;
        }

        .decision {
            margin-top: 12px;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">
    <h1> AI vs Human Detector</h1>

    <form method="POST">
        <textarea name="text" placeholder="Type your text here..." required></textarea>
        <br>
        <button type="submit">Analyze</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h3> Prediction: {{ prediction }}</h3>
        <h3> Confidence: {{ confidence }}%</h3>

        <div class="confidence-bar">
            <div class="confidence-fill"></div>
        </div>

        <h3 class="decision" style="
        color:
        {% if 'Acceptable' in decision %}#ff66b2
        {% elif 'Review' in decision %}#ffcc00
        {% else %}#ff4d4d
        {% endif %}
        ">
         {{ decision }}
        </h3>
    </div>
    {% endif %}
</div>

</body>
</html>
